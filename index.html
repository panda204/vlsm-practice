<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLSM Box Method Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #050a14;
            --surface: #0a1628;
            --border:  #1a3a5c;
            --text:    #c8d8f0;
            --muted:   #4a6a8a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 40px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,160,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,160,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
        }

        header { text-align: center; margin-bottom: 24px; }

        .title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(1.4rem, 4vw, 2.4rem);
            font-weight: 900;
            letter-spacing: 0.08em;
            background: linear-gradient(135deg, #00e5ff, #7b61ff, #ff3a6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.82rem;
            letter-spacing: 0.06em;
        }

        .controls {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px 22px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
        }

        .slider-group { flex: 1; min-width: 260px; }

        .slider-label {
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slider-label span {
            font-family: 'Orbitron', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #00e5ff;
            box-shadow: 0 0 10px #00e5ff, 0 0 20px rgba(0,229,255,0.4);
            cursor: pointer;
        }

        .tick-row {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            padding: 0 2px;
        }

        .tick { font-size: 0.6rem; color: var(--muted); opacity: 0.5; }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn {
            font-family: 'Orbitron', monospace;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-primary {
            background: transparent;
            color: #00e5ff;
            border: 1px solid #00e5ff;
            box-shadow: 0 0 8px rgba(0,229,255,0.25), inset 0 0 8px rgba(0,229,255,0.05);
        }
        .btn-primary:hover {
            background: rgba(0,229,255,0.1);
            box-shadow: 0 0 18px rgba(0,229,255,0.5);
        }

        .btn-danger {
            background: transparent;
            color: #ff3a6e;
            border: 1px solid #ff3a6e;
            box-shadow: 0 0 8px rgba(255,58,110,0.25);
        }
        .btn-danger:hover {
            background: rgba(255,58,110,0.1);
            box-shadow: 0 0 18px rgba(255,58,110,0.5);
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: var(--muted);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* ── CANVAS ──────────────────────────────────────────────────────────
         * CSS Grid — each leaf gets a named grid-area that always fills its
         * allocated cell completely. No flex shrinking, no fixed heights.
         */
        #canvas {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 1px solid var(--border);
            background: #060d1a;
            box-shadow: 0 0 40px rgba(0,160,255,0.08);
            border-radius: 6px;
            overflow: hidden;
            display: grid;
            position: relative;
        }

        .cell {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: crosshair;
            overflow: hidden;
            transition: background 0.15s, box-shadow 0.15s;
        }

        /* "SPLIT" hint in corner */
        .cell::after {
            content: 'SPLIT ÷';
            position: absolute;
            bottom: 5px;
            right: 7px;
            font-size: 0.5em;
            opacity: 0;
            transition: opacity 0.2s;
            letter-spacing: 0.06em;
            pointer-events: none;
        }
        .cell:hover::after { opacity: 0.55; }

        .cell-inner {
            text-align: center;
            padding: 4px 6px;
            width: 100%;
            pointer-events: none;
        }

        .cell-cidr {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            line-height: 1;
            /* font-size injected by JS */
        }

        .cell-info {
            margin-top: 0.3em;
            line-height: 1.6;
            /* font-size injected by JS */
        }

        .cell-row { display: block; }
        .cell-row.label { opacity: 0.5; font-size: 0.78em; letter-spacing: 0.06em; }
        .cell-row.value { opacity: 0.9; }
        .cell-row.dim   { opacity: 0.45; }

        @keyframes splitIn {
            from { opacity: 0; transform: scale(0.86); }
            to   { opacity: 1; transform: scale(1); }
        }
        .cell.new { animation: splitIn 0.22s ease forwards; }

        .info-bar {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 6px 14px;
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }
        .info-chip strong { color: var(--text); font-weight: normal; }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #0a1628;
            border: 1px solid #ff3a6e;
            color: #ff3a6e;
            padding: 10px 22px;
            border-radius: 4px;
            font-size: 0.78rem;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255,58,110,0.3);
            white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div class="wrapper">
    <header>
        <div class="title">VLSM BOX VISUALIZER</div>
        <div class="subtitle">VARIABLE LENGTH SUBNET MASKING — BOX METHOD</div>
    </header>

    <div class="controls">
        <div class="slider-group">
            <div class="slider-label">
                STARTING PREFIX
                <span id="prefixDisplay">/24</span>
            </div>
            <input type="range" id="prefixSlider" min="0" max="30" value="24" step="1">
            <div class="tick-row">
                <span class="tick">/0</span>
                <span class="tick">/8</span>
                <span class="tick">/16</span>
                <span class="tick">/24</span>
                <span class="tick">/30</span>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" id="applyBtn">APPLY</button>
            <button class="btn btn-danger"  id="resetBtn">RESET</button>
        </div>
    </div>

    <div class="legend" id="legend"></div>
    <div id="canvas"></div>

    <div class="info-bar">
        <div class="info-chip">SPLITS: <strong id="splitCount">0</strong></div>
        <div class="info-chip">SUBNETS: <strong id="subnetCount">1</strong></div>
        <div class="info-chip">CLICK ANY BLOCK TO HALVE IT</div>
    </div>
</div>
<div id="toast"></div>

<script>
// ── Palette ──────────────────────────────────────────────────────────────────
const COLORS = [
    '#ff3a6e','#ff6b35','#ff9f1c','#f7d600','#a8ff3e',
    '#2dffb3','#00e5ff','#3d9dff','#7b61ff','#cc44ff',
    '#ff44cc','#ff3a6e','#ff6b35','#ff9f1c','#f7d600',
    '#a8ff3e','#2dffb3','#00e5ff','#3d9dff','#7b61ff',
    '#cc44ff','#ff44cc','#ff3a6e','#ff6b35','#ff9f1c',
    '#f7d600','#a8ff3e','#2dffb3','#00e5ff','#3d9dff','#7b61ff'
];

function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
}

// ── IP helpers ────────────────────────────────────────────────────────────────
function blockInfo(prefix, startOct, endOct) {
    const total  = endOct - startOct + 1;
    const usable = Math.max(0, total - 2);
    return {
        total,
        usable,
        network : `10.0.0.${startOct}`,
        bcast   : `10.0.0.${endOct}`,
        firstH  : total >= 4 ? `10.0.0.${startOct + 1}` : `10.0.0.${startOct}`,
        lastH   : total >= 4 ? `10.0.0.${endOct  - 1}` : `10.0.0.${endOct}`,
    };
}

// ── Tree ──────────────────────────────────────────────────────────────────────
let tree = null;
let startPrefix = 24;
let splitCount = 0;
let nodeSeq = 0;

function makeNode(prefix, startOct, endOct) {
    return { id: `n${nodeSeq++}`, prefix, startOct, endOct, split: null };
}

function initTree() {
    nodeSeq = 0;
    splitCount = 0;
    tree = makeNode(startPrefix, 0, 255);
}

function collectLeaves(node, out = []) {
    if (!node.split) { out.push(node); return out; }
    collectLeaves(node.split.left, out);
    collectLeaves(node.split.right, out);
    return out;
}

// ── Grid layout ───────────────────────────────────────────────────────────────
/*
 * We build a 2-D grid (array of arrays of node IDs) by recursively combining
 * left and right subtrees. Each leaf occupies exactly its allocated cells.
 * The resulting areas string drives CSS grid-template-areas, so every cell
 * always fills 100% of its grid track — no shrinking.
 */
function computeGrid(node) {
    if (!node.split) {
        return { cols: 1, rows: 1, areas: [[node.id]] };
    }

    const L = computeGrid(node.split.left);
    const R = computeGrid(node.split.right);

    if (node.split.dir === 'v') {
        // Side by side → columns grow
        const rows = Math.max(L.rows, R.rows);
        const La = stretchRows(L.areas, rows);
        const Ra = stretchRows(R.areas, rows);
        return {
            cols: L.cols + R.cols,
            rows,
            areas: La.map((row, i) => [...row, ...Ra[i]])
        };
    } else {
        // Stacked → rows grow
        const cols = Math.max(L.cols, R.cols);
        const La = stretchCols(L.areas, cols);
        const Ra = stretchCols(R.areas, cols);
        return {
            cols,
            rows: L.rows + R.rows,
            areas: [...La, ...Ra]
        };
    }
}

function stretchRows(areas, targetRows) {
    const r = areas.map(row => [...row]);
    while (r.length < targetRows) r.push([...r[r.length - 1]]);
    return r;
}

function stretchCols(areas, targetCols) {
    return areas.map(row => {
        const r = [...row];
        while (r.length < targetCols) r.push(r[r.length - 1]);
        return r;
    });
}

// ── Render ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');

function render(animateIds = []) {
    const grid = computeGrid(tree);

    canvas.style.gridTemplateColumns = `repeat(${grid.cols}, 1fr)`;
    canvas.style.gridTemplateRows    = `repeat(${grid.rows}, 1fr)`;
    canvas.style.gridTemplateAreas   = grid.areas.map(r => `"${r.join(' ')}"`).join(' ');

    canvas.innerHTML = '';

    // Measure canvas for font scaling
    const canvasW  = canvas.offsetWidth  || 700;
    const canvasH  = canvas.offsetHeight || 700;
    const cellW    = canvasW / grid.cols;
    const cellH    = canvasH / grid.rows;
    const cellMin  = Math.min(cellW, cellH);

    // Text size thresholds
    const cidrPx   = Math.max(10, Math.min(cellMin * 0.24, 60));
    const infoPx   = Math.max(7,  Math.min(cellMin * 0.095, 15));
    const showFull = cellMin >= 90;   // show all 4 rows
    const showMid  = cellMin >= 55;   // show network + bcast only
    const showMin  = cellMin >= 32;   // show at least something

    collectLeaves(tree).forEach(node => {
        const color = COLORS[Math.min(node.prefix, COLORS.length - 1)];
        const info  = blockInfo(node.prefix, node.startOct, node.endOct);
        const isNew = animateIds.includes(node.id);

        const cell = document.createElement('div');
        cell.className = 'cell' + (isNew ? ' new' : '');
        cell.style.gridArea        = node.id;
        cell.style.backgroundColor = hexToRgba(color, 0.06);
        cell.style.border          = `1px solid ${hexToRgba(color, 0.28)}`;
        cell.style.color           = color;

        cell.addEventListener('mouseenter', () => {
            cell.style.backgroundColor = hexToRgba(color, 0.14);
            cell.style.boxShadow = `inset 0 0 28px ${hexToRgba(color, 0.2)}`;
        });
        cell.addEventListener('mouseleave', () => {
            cell.style.backgroundColor = hexToRgba(color, 0.06);
            cell.style.boxShadow = 'none';
        });

        // ── Content ────────────────────────────────────────────────────────
        const inner = document.createElement('div');
        inner.className = 'cell-inner';

        // CIDR badge
        const cidrEl = document.createElement('div');
        cidrEl.className   = 'cell-cidr';
        cidrEl.style.fontSize   = `${cidrPx}px`;
        cidrEl.style.color      = color;
        cidrEl.style.textShadow = `0 0 ${Math.round(cidrPx * 0.55)}px ${hexToRgba(color, 0.65)}`;
        cidrEl.textContent = `/${node.prefix}`;
        inner.appendChild(cidrEl);

        if (showMin) {
            const infoEl = document.createElement('div');
            infoEl.className = 'cell-info';
            infoEl.style.fontSize = `${infoPx}px`;
            infoEl.style.color    = color;

            if (showFull) {
                infoEl.innerHTML = `
                    <span class="cell-row label">NETWORK</span>
                    <span class="cell-row value">${info.network}</span>
                    <span class="cell-row label">FIRST HOST</span>
                    <span class="cell-row value">${info.firstH}</span>
                    <span class="cell-row label">LAST HOST</span>
                    <span class="cell-row value">${info.lastH}</span>
                    <span class="cell-row label">BROADCAST</span>
                    <span class="cell-row value">${info.bcast}</span>
                    <span class="cell-row dim">${info.total} IPs · ${info.usable} usable</span>
                `;
            } else if (showMid) {
                infoEl.innerHTML = `
                    <span class="cell-row value">${info.network}</span>
                    <span class="cell-row dim">${info.bcast}</span>
                `;
            } else {
                infoEl.innerHTML = `<span class="cell-row dim">${info.network}</span>`;
            }

            inner.appendChild(infoEl);
        }

        cell.appendChild(inner);

        // ── Split on click ─────────────────────────────────────────────────
        cell.addEventListener('click', () => {
            if (node.prefix >= 30) {
                showToast('⚠  /30 is the minimum — only 4 IPs (2 usable)');
                return;
            }
            const numIps = node.endOct - node.startOct + 1;
            const mid    = node.startOct + Math.floor(numIps / 2) - 1;
            const depth  = node.prefix - startPrefix;
            const dir    = depth % 2 === 0 ? 'h' : 'v';

            node.split = {
                dir,
                left:  makeNode(node.prefix + 1, node.startOct, mid),
                right: makeNode(node.prefix + 1, mid + 1, node.endOct)
            };
            splitCount++;
            render([node.split.left.id, node.split.right.id]);
        });

        canvas.appendChild(cell);
    });

    updateStats();
}

// ── Stats & legend ────────────────────────────────────────────────────────────
function updateStats() {
    document.getElementById('splitCount').textContent  = splitCount;
    document.getElementById('subnetCount').textContent = collectLeaves(tree).length;
}

function buildLegend() {
    const legend = document.getElementById('legend');
    legend.innerHTML = '';
    for (let d = 0; d <= Math.min(30 - startPrefix, 9); d++) {
        const p = startPrefix + d;
        if (p > 30) break;
        const item = document.createElement('div');
        item.className = 'legend-item';
        const dot = document.createElement('div');
        dot.className        = 'legend-dot';
        dot.style.background = COLORS[p];
        dot.style.boxShadow  = `0 0 6px ${COLORS[p]}`;
        item.appendChild(dot);
        item.appendChild(document.createTextNode(`/${p}`));
        legend.appendChild(item);
    }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
const toastEl = document.getElementById('toast');
let toastTimer;
function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
function init() {
    initTree();
    buildLegend();
    render();
}

document.getElementById('prefixSlider').addEventListener('input', e => {
    document.getElementById('prefixDisplay').textContent = `/${e.target.value}`;
});
document.getElementById('applyBtn').addEventListener('click', () => {
    startPrefix = parseInt(document.getElementById('prefixSlider').value);
    init();
});
document.getElementById('resetBtn').addEventListener('click', () => {
    document.getElementById('prefixSlider').value = 24;
    document.getElementById('prefixDisplay').textContent = '/24';
    startPrefix = 24;
    init();
});

// Re-scale text on window resize
window.addEventListener('resize', () => render());

init();
</script>
</body>
</html>
