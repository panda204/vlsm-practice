<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLSM Box Method Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #050a14;
            --surface: #0a1628;
            --border:  #1a3a5c;
            --text:    #c8d8f0;
            --muted:   #4a6a8a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 40px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,160,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,160,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
            );
            pointer-events: none; z-index: 0;
        }

        .wrapper { position: relative; z-index: 1; width: 100%; max-width: 960px; }

        header { text-align: center; margin-bottom: 22px; }
        .title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(1.3rem, 4vw, 2.3rem);
            font-weight: 900;
            letter-spacing: 0.08em;
            background: linear-gradient(135deg, #00e5ff, #7b61ff, #ff3a6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            margin-bottom: 5px;
        }
        .subtitle { color: var(--muted); font-size: 0.8rem; letter-spacing: 0.06em; }

        /* ── Controls panel ── */
        .controls {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }

        .control-group { display: flex; flex-direction: column; gap: 6px; }
        .control-group.grow { flex: 1; min-width: 220px; }

        .ctrl-label {
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
        }

        /* Network address input */
        .net-row { display: flex; gap: 6px; align-items: center; }

        .net-input {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            background: #060d1a;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            padding: 8px 12px;
            outline: none;
            width: 160px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .net-input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 10px rgba(0,229,255,0.25);
        }
        .net-input.error {
            border-color: #ff3a6e;
            box-shadow: 0 0 10px rgba(255,58,110,0.3);
        }

        .net-sep {
            font-family: 'Orbitron', monospace;
            font-size: 1.1rem;
            color: var(--muted);
            padding: 0 2px;
        }

        /* Slider */
        .slider-label {
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .slider-label span {
            font-family: 'Orbitron', monospace;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: #00e5ff;
            box-shadow: 0 0 10px #00e5ff, 0 0 20px rgba(0,229,255,0.4);
            cursor: pointer;
        }
        .tick-row {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            padding: 0 2px;
        }
        .tick { font-size: 0.58rem; color: var(--muted); opacity: 0.5; }

        /* Buttons */
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
        .btn {
            font-family: 'Orbitron', monospace;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 9px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .btn-primary {
            background: transparent; color: #00e5ff;
            border: 1px solid #00e5ff;
            box-shadow: 0 0 8px rgba(0,229,255,0.2);
        }
        .btn-primary:hover { background: rgba(0,229,255,0.1); box-shadow: 0 0 16px rgba(0,229,255,0.5); }
        .btn-danger {
            background: transparent; color: #ff3a6e;
            border: 1px solid #ff3a6e;
            box-shadow: 0 0 8px rgba(255,58,110,0.2);
        }
        .btn-danger:hover { background: rgba(255,58,110,0.1); box-shadow: 0 0 16px rgba(255,58,110,0.5); }

        /* Network display badge */
        .net-badge {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: var(--muted);
        }
        .net-badge-addr {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0,229,255,0.5);
        }
        .net-badge-detail { color: var(--muted); font-size: 0.72rem; }
        .net-badge-detail span { color: var(--text); }

        /* Legend */
        .legend {
            display: flex; flex-wrap: wrap; gap: 8px;
            margin-bottom: 10px; justify-content: center;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.68rem; color: var(--muted); }
        .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

        /* ── CANVAS ── */
        #canvas {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 1px solid var(--border);
            background: #060d1a;
            box-shadow: 0 0 40px rgba(0,160,255,0.08);
            border-radius: 6px;
            overflow: hidden;
            display: grid;
            position: relative;
        }

        .cell {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: crosshair;
            /* CRITICAL: no overflow:hidden — let content scale, not clip */
            transition: background 0.15s, box-shadow 0.15s;
            container-type: size; /* enable container queries */
        }

        .cell:hover .split-hint { opacity: 0.5; }

        .split-hint {
            position: absolute;
            bottom: 4px; right: 6px;
            font-size: 0.48em;
            opacity: 0;
            transition: opacity 0.2s;
            letter-spacing: 0.05em;
            pointer-events: none;
            white-space: nowrap;
        }

        /* cell-inner scales via container query — no JS font sizing needed */
        .cell-inner {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4% 3%;
            pointer-events: none;
            overflow: hidden;
            gap: 0;
        }

        /* CIDR: scales with container width, never overflows */
        .cell-cidr {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            line-height: 1;
            /* Scale font to 22% of container width, capped at a sane max */
            font-size: clamp(8px, 22cqw, 56px);
            white-space: nowrap;
            text-align: center;
            width: 100%;
        }

        /* Info lines: scale to 8% of container width */
        .cell-info {
            width: 100%;
            text-align: center;
            margin-top: 4%;
            /* each row rendered via spans */
        }

        .cell-info .row {
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-align: center;
        }

        .cell-info .lbl {
            font-size: clamp(5px, 5.5cqw, 10px);
            opacity: 0.45;
            letter-spacing: 0.08em;
            margin-top: 3%;
        }
        .cell-info .val {
            font-size: clamp(6px, 7cqw, 13px);
            opacity: 0.9;
        }
        .cell-info .dim {
            font-size: clamp(5px, 5.5cqw, 10px);
            opacity: 0.4;
            margin-top: 3%;
        }

        @keyframes splitIn {
            from { opacity: 0; transform: scale(0.84); }
            to   { opacity: 1; transform: scale(1); }
        }
        .cell.new { animation: splitIn 0.2s ease forwards; }

        /* Info bar */
        .info-bar {
            margin-top: 10px;
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
        }
        .info-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 5px 12px;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }
        .info-chip strong { color: var(--text); font-weight: normal; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #0a1628;
            border: 1px solid #ff3a6e;
            color: #ff3a6e;
            padding: 9px 20px;
            border-radius: 4px;
            font-size: 0.76rem;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255,58,110,0.3);
            white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div class="wrapper">
    <header>
        <div class="title">VLSM BOX VISUALIZER</div>
        <div class="subtitle">VARIABLE LENGTH SUBNET MASKING — BOX METHOD</div>
    </header>

    <div class="controls">

        <!-- Network address input -->
        <div class="control-group">
            <div class="ctrl-label">Network Address</div>
            <div class="net-row">
                <input class="net-input" id="oct1" type="text" maxlength="3" value="10"  placeholder="10">
                <span class="net-sep">.</span>
                <input class="net-input" id="oct2" type="text" maxlength="3" value="0"   placeholder="0">
                <span class="net-sep">.</span>
                <input class="net-input" id="oct3" type="text" maxlength="3" value="0"   placeholder="0">
                <span class="net-sep">.</span>
                <input class="net-input" id="oct4" type="text" maxlength="3" value="0"   placeholder="0">
            </div>
        </div>

        <!-- Prefix slider -->
        <div class="control-group grow">
            <div class="slider-label">
                <span class="ctrl-label">Starting Prefix</span>
                <span id="prefixDisplay">/24</span>
            </div>
            <input type="range" id="prefixSlider" min="1" max="30" value="24" step="1">
            <div class="tick-row">
                <span class="tick">/1</span>
                <span class="tick">/8</span>
                <span class="tick">/16</span>
                <span class="tick">/24</span>
                <span class="tick">/30</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="btn-group">
            <button class="btn btn-primary" id="applyBtn">APPLY</button>
            <button class="btn btn-danger"  id="resetBtn">RESET</button>
        </div>

    </div>

    <!-- Active network badge -->
    <div class="net-badge" id="netBadge">
        <div class="net-badge-addr" id="badgeAddr">10.0.0.0/24</div>
        <div class="net-badge-detail">TOTAL IPs: <span id="badgeTotal">256</span></div>
        <div class="net-badge-detail">USABLE: <span id="badgeUsable">254</span></div>
        <div class="net-badge-detail">MASK: <span id="badgeMask">255.255.255.0</span></div>
    </div>

    <div class="legend" id="legend"></div>
    <div id="canvas"></div>

    <div class="info-bar">
        <div class="info-chip">SPLITS: <strong id="splitCount">0</strong></div>
        <div class="info-chip">SUBNETS: <strong id="subnetCount">1</strong></div>
        <div class="info-chip">CLICK ANY BLOCK TO HALVE IT</div>
    </div>
</div>
<div id="toast"></div>

<script>
// ── Palette ──────────────────────────────────────────────────────────────────
const COLORS = [
    '#ff3a6e','#ff6b35','#ff9f1c','#f7d600','#a8ff3e',
    '#2dffb3','#00e5ff','#3d9dff','#7b61ff','#cc44ff',
    '#ff44cc','#ff3a6e','#ff6b35','#ff9f1c','#f7d600',
    '#a8ff3e','#2dffb3','#00e5ff','#3d9dff','#7b61ff',
    '#cc44ff','#ff44cc','#ff3a6e','#ff6b35','#ff9f1c',
    '#f7d600','#a8ff3e','#2dffb3','#00e5ff','#3d9dff','#7b61ff'
];

function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
}

// ── IP math ───────────────────────────────────────────────────────────────────
function ipToInt(a,b,c,d) { return ((a<<24)|(b<<16)|(c<<8)|d) >>> 0; }
function intToIp(n) {
    return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');
}
function maskFromPrefix(p) {
    return p === 0 ? 0 : (0xFFFFFFFF << (32-p)) >>> 0;
}
function subnetMaskStr(p) { return intToIp(maskFromPrefix(p)); }

// Given a network base IP (as int) and a prefix, return block info
function blockInfo(baseInt, prefix) {
    const size    = Math.pow(2, 32 - prefix);
    const total   = size;
    const usable  = prefix <= 30 ? Math.max(0, total - 2) : total === 1 ? 1 : 0;
    const network = intToIp(baseInt);
    const bcast   = intToIp((baseInt + size - 1) >>> 0);
    const firstH  = total >= 4 ? intToIp((baseInt + 1) >>> 0) : network;
    const lastH   = total >= 4 ? intToIp((baseInt + size - 2) >>> 0) : bcast;
    return { total, usable, network, bcast, firstH, lastH };
}

function formatCount(n) {
    if (n >= 1e9) return (n/1e9).toFixed(2).replace(/\.?0+$/,'')+'B';
    if (n >= 1e6) return (n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';
    if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.?0+$/,'')+'K';
    return n;
}

// ── State ─────────────────────────────────────────────────────────────────────
let baseIp     = ipToInt(10,0,0,0);
let startPrefix = 24;
let splitCount  = 0;
let nodeSeq     = 0;
let tree        = null;

function makeNode(prefix, ipInt) {
    return { id: `n${nodeSeq++}`, prefix, ipInt, split: null };
}
function initTree() {
    nodeSeq = 0; splitCount = 0;
    // Align baseIp to the network boundary for the chosen prefix
    const mask = maskFromPrefix(startPrefix);
    const alignedBase = (baseIp & mask) >>> 0;
    tree = makeNode(startPrefix, alignedBase);
}
function collectLeaves(node, out=[]) {
    if (!node.split) { out.push(node); return out; }
    collectLeaves(node.split.left, out);
    collectLeaves(node.split.right, out);
    return out;
}

// ── Grid layout ───────────────────────────────────────────────────────────────
function computeGrid(node) {
    if (!node.split) return { cols:1, rows:1, areas:[[node.id]] };
    const L = computeGrid(node.split.left);
    const R = computeGrid(node.split.right);
    if (node.split.dir === 'v') {
        const rows = Math.max(L.rows, R.rows);
        const La = stretchRows(L.areas, rows);
        const Ra = stretchRows(R.areas, rows);
        return { cols: L.cols+R.cols, rows, areas: La.map((row,i)=>[...row,...Ra[i]]) };
    } else {
        const cols = Math.max(L.cols, R.cols);
        const La = stretchCols(L.areas, cols);
        const Ra = stretchCols(R.areas, cols);
        return { cols, rows: L.rows+R.rows, areas:[...La,...Ra] };
    }
}
function stretchRows(areas, t) {
    const r = areas.map(row=>[...row]);
    while(r.length<t) r.push([...r[r.length-1]]);
    return r;
}
function stretchCols(areas, t) {
    return areas.map(row=>{ const r=[...row]; while(r.length<t) r.push(r[r.length-1]); return r; });
}

// ── Render ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');

function render(animateIds=[]) {
    const grid = computeGrid(tree);

    canvas.style.gridTemplateColumns = `repeat(${grid.cols}, 1fr)`;
    canvas.style.gridTemplateRows    = `repeat(${grid.rows}, 1fr)`;
    canvas.style.gridTemplateAreas   = grid.areas.map(r=>`"${r.join(' ')}"`).join(' ');
    canvas.innerHTML = '';

    collectLeaves(tree).forEach(node => {
        const color  = COLORS[Math.min(node.prefix, COLORS.length-1)];
        const info   = blockInfo(node.ipInt, node.prefix);
        const isNew  = animateIds.includes(node.id);

        const cell = document.createElement('div');
        cell.className = 'cell' + (isNew ? ' new' : '');
        cell.style.gridArea        = node.id;
        cell.style.backgroundColor = hexToRgba(color, 0.06);
        cell.style.border          = `1px solid ${hexToRgba(color, 0.28)}`;

        cell.addEventListener('mouseenter', () => {
            cell.style.backgroundColor = hexToRgba(color, 0.13);
            cell.style.boxShadow = `inset 0 0 28px ${hexToRgba(color, 0.18)}`;
        });
        cell.addEventListener('mouseleave', () => {
            cell.style.backgroundColor = hexToRgba(color, 0.06);
            cell.style.boxShadow = 'none';
        });

        // ── Content (all font sizes via cqw — container query units) ──
        const inner = document.createElement('div');
        inner.className = 'cell-inner';

        // CIDR — always visible, scales with container
        const cidrEl = document.createElement('div');
        cidrEl.className = 'cell-cidr';
        cidrEl.style.color      = color;
        cidrEl.style.textShadow = `0 0 16px ${hexToRgba(color, 0.7)}`;
        cidrEl.textContent = `/${node.prefix}`;
        inner.appendChild(cidrEl);

        // Info block — always rendered, CSS handles scaling/hiding
        const infoEl = document.createElement('div');
        infoEl.className = 'cell-info';
        infoEl.style.color = color;
        infoEl.innerHTML = `
            <span class="row lbl">NETWORK</span>
            <span class="row val">${info.network}</span>
            <span class="row lbl">FIRST HOST</span>
            <span class="row val">${info.firstH}</span>
            <span class="row lbl">LAST HOST</span>
            <span class="row val">${info.lastH}</span>
            <span class="row lbl">BROADCAST</span>
            <span class="row val">${info.bcast}</span>
            <span class="row dim">${formatCount(info.total)} IPs · ${formatCount(info.usable)} usable</span>
        `;
        inner.appendChild(infoEl);

        const hint = document.createElement('div');
        hint.className   = 'split-hint';
        hint.style.color = color;
        hint.textContent = 'SPLIT ÷';
        cell.appendChild(hint);

        cell.appendChild(inner);

        // Click → split
        cell.addEventListener('click', () => {
            if (node.prefix >= 30) {
                showToast('⚠  /30 is the minimum — only 4 IPs (2 usable)');
                return;
            }
            const depth = node.prefix - startPrefix;
            const dir   = depth % 2 === 0 ? 'h' : 'v';
            const childPrefix = node.prefix + 1;
            const childSize   = Math.pow(2, 32 - childPrefix);
            node.split = {
                dir,
                left:  makeNode(childPrefix, node.ipInt),
                right: makeNode(childPrefix, (node.ipInt + childSize) >>> 0)
            };
            splitCount++;
            render([node.split.left.id, node.split.right.id]);
        });

        canvas.appendChild(cell);
    });

    updateStats();
}

// ── Badge, stats, legend ──────────────────────────────────────────────────────
function updateBadge() {
    const mask    = maskFromPrefix(startPrefix);
    const aligned = (baseIp & mask) >>> 0;
    const total   = Math.pow(2, 32 - startPrefix);
    const usable  = startPrefix <= 30 ? Math.max(0, total - 2) : 1;
    document.getElementById('badgeAddr').textContent  = `${intToIp(aligned)}/${startPrefix}`;
    document.getElementById('badgeTotal').textContent = formatCount(total);
    document.getElementById('badgeUsable').textContent= formatCount(usable);
    document.getElementById('badgeMask').textContent  = subnetMaskStr(startPrefix);
}

function updateStats() {
    document.getElementById('splitCount').textContent  = splitCount;
    document.getElementById('subnetCount').textContent = collectLeaves(tree).length;
}

function buildLegend() {
    const legend = document.getElementById('legend');
    legend.innerHTML = '';
    for (let d = 0; d <= Math.min(30 - startPrefix, 9); d++) {
        const p = startPrefix + d;
        if (p > 30) break;
        const item = document.createElement('div');
        item.className = 'legend-item';
        const dot = document.createElement('div');
        dot.className        = 'legend-dot';
        dot.style.background = COLORS[p];
        dot.style.boxShadow  = `0 0 6px ${COLORS[p]}`;
        item.appendChild(dot);
        item.appendChild(document.createTextNode(`/${p}`));
        legend.appendChild(item);
    }
}

// ── Input validation ──────────────────────────────────────────────────────────
function parseNetworkInputs() {
    const ids = ['oct1','oct2','oct3','oct4'];
    let valid = true;
    const octs = ids.map(id => {
        const el  = document.getElementById(id);
        const val = parseInt(el.value.trim(), 10);
        if (isNaN(val) || val < 0 || val > 255) {
            el.classList.add('error'); valid = false; return 0;
        }
        el.classList.remove('error');
        return val;
    });
    if (!valid) { showToast('⚠  Invalid IP — each octet must be 0–255'); return null; }
    return ipToInt(octs[0], octs[1], octs[2], octs[3]);
}

// Only allow digits in octet inputs
['oct1','oct2','oct3','oct4'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', () => {
        el.value = el.value.replace(/[^0-9]/g,'');
        if (el.value.length === 3 || (el.value.length && parseInt(el.value)>25)) {
            // Auto-advance to next field
            const next = el.parentElement.children[Array.from(el.parentElement.children).indexOf(el) + 2];
            if (next && next.tagName === 'INPUT') next.focus();
        }
    });
    el.addEventListener('keydown', e => {
        if (e.key === '.' || e.key === 'Tab') {
            const inputs = document.querySelectorAll('.net-input');
            const idx = Array.from(inputs).indexOf(el);
            if (idx < 3) { e.preventDefault(); inputs[idx+1].focus(); }
        }
    });
});

// ── Toast ─────────────────────────────────────────────────────────────────────
const toastEl = document.getElementById('toast');
let toastTimer;
function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 2800);
}

// ── Init / controls ───────────────────────────────────────────────────────────
function init() {
    initTree();
    buildLegend();
    updateBadge();
    render();
}

document.getElementById('prefixSlider').addEventListener('input', e => {
    document.getElementById('prefixDisplay').textContent = `/${e.target.value}`;
});

document.getElementById('applyBtn').addEventListener('click', () => {
    const parsed = parseNetworkInputs();
    if (parsed === null) return;
    baseIp      = parsed;
    startPrefix = parseInt(document.getElementById('prefixSlider').value);
    init();
});

document.getElementById('resetBtn').addEventListener('click', () => {
    document.getElementById('oct1').value = '10';
    document.getElementById('oct2').value = '0';
    document.getElementById('oct3').value = '0';
    document.getElementById('oct4').value = '0';
    ['oct1','oct2','oct3','oct4'].forEach(id => document.getElementById(id).classList.remove('error'));
    document.getElementById('prefixSlider').value = 24;
    document.getElementById('prefixDisplay').textContent = '/24';
    baseIp      = ipToInt(10,0,0,0);
    startPrefix = 24;
    init();
});

window.addEventListener('resize', () => render());

init();
</script>
</body>
</html>
